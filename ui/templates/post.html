<!-- Set action and method -->
<form action="/create-post" method="POST">
    <div class="form-group">
        <label for="title">Title</label>
        <!-- Add name="title" -->
        <input type="text" id="title" name="title" required placeholder="What's on your mind?">
    </div>

    <div class="form-group">
        <label>Categories (Select at least one)</label>
        <div class="categories-container">
            <!-- Add name="categories" and value for each -->
            <label class="checkbox-item">
                <input type="checkbox" name="categories" value="Technology">
                <span class="custom-box"></span> Technology
            </label>
            <label class="checkbox-item">
                <input type="checkbox" name="categories" value="Gaming">
                <span class="custom-box"></span> Gaming
            </label>
            <label class="checkbox-item">
                <input type="checkbox" name="categories" value="Science">
                <span class="custom-box"></span> Science
            </label>
            <label class="checkbox-item">
                <input type="checkbox" name="categories" value="Music">
                <span class="custom-box"></span> Music
            </label>
        </div>
    </div>

    <div class="form-group">
        <label for="content">Content</label>
        <!-- Add name="content" -->
        <textarea id="content" name="content" required placeholder="Write your post here..."></textarea>
    </div>

    <div class="form-footer">
        <a href="/" class="btn-cancel" style="text-decoration: none; text-align: center; line-height: 40px;">Cancel</a>
        <button type="submit" class="btn-publish">Publish Post</button>
    </div>
</form>
